<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-bright: #f0c060;
    --gold-dim: #7a6030;
    --red: #c0392b;
    --blue: #1a8cff;
    --blue-dim: #0a3a6a;
    --bg: #050810;
    --panel: rgba(10, 20, 40, 0.85);
    --text: #d0e8ff;
    --text-dim: #5a7a9a;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Exo 2’, sans-serif;
min-height: 100vh;
overflow: hidden;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

/* Animated background grid */
.bg-grid {
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(26, 140, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(26, 140, 255, 0.04) 1px, transparent 1px);
background-size: 40px 40px;
animation: gridPulse 8s ease-in-out infinite;
z-index: 0;
}

@keyframes gridPulse {
0%, 100% { opacity: 0.5; }
50% { opacity: 1; }
}

/* Radial glow */
.bg-glow {
position: fixed;
inset: 0;
background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(26, 80, 160, 0.15) 0%, transparent 70%);
z-index: 0;
}

.container {
position: relative;
z-index: 1;
width: 100%;
max-width: 480px;
padding: 20px;
display: flex;
flex-direction: column;
align-items: center;
gap: 24px;
}

/* Header */
.header {
text-align: center;
letter-spacing: 0.3em;
}

.header-title {
font-family: ‘Rajdhani’, sans-serif;
font-size: 2.8rem;
font-weight: 700;
color: var(–gold-bright);
text-shadow: 0 0 30px rgba(201, 168, 76, 0.6), 0 0 60px rgba(201, 168, 76, 0.2);
line-height: 1;
}

.header-sub {
font-size: 0.65rem;
font-weight: 200;
color: var(–text-dim);
letter-spacing: 0.5em;
margin-top: 4px;
}

/* Arc reactor / main orb */
.reactor-wrap {
position: relative;
width: 200px;
height: 200px;
display: flex;
align-items: center;
justify-content: center;
}

.ring {
position: absolute;
border-radius: 50%;
border: 1px solid transparent;
}

.ring-1 {
width: 200px; height: 200px;
border-color: rgba(26, 140, 255, 0.2);
animation: rotate 20s linear infinite;
}

.ring-1::before {
content: ‘’;
position: absolute;
top: -2px; left: 30%;
width: 20px; height: 3px;
background: var(–blue);
border-radius: 2px;
box-shadow: 0 0 10px var(–blue);
}

.ring-2 {
width: 168px; height: 168px;
border-color: rgba(201, 168, 76, 0.15);
animation: rotate 14s linear infinite reverse;
}

.ring-2::before {
content: ‘’;
position: absolute;
bottom: -2px; right: 25%;
width: 14px; height: 3px;
background: var(–gold);
border-radius: 2px;
box-shadow: 0 0 10px var(–gold);
}

.ring-3 {
width: 136px; height: 136px;
border-color: rgba(26, 140, 255, 0.1);
animation: rotate 9s linear infinite;
}

@keyframes rotate {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

.core {
width: 100px;
height: 100px;
border-radius: 50%;
background: radial-gradient(circle at 35% 35%,
rgba(100, 180, 255, 0.9) 0%,
rgba(26, 100, 200, 0.7) 30%,
rgba(10, 30, 80, 0.9) 70%,
rgba(5, 10, 30, 1) 100%
);
box-shadow:
0 0 20px rgba(26, 140, 255, 0.8),
0 0 40px rgba(26, 140, 255, 0.4),
0 0 80px rgba(26, 140, 255, 0.2),
inset 0 0 20px rgba(100, 180, 255, 0.3);
cursor: pointer;
transition: all 0.3s ease;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

.core::after {
content: ‘’;
position: absolute;
width: 40px; height: 40px;
border-radius: 50%;
background: radial-gradient(circle, rgba(180, 220, 255, 0.6), transparent 70%);
animation: corePulse 2s ease-in-out infinite;
}

@keyframes corePulse {
0%, 100% { transform: scale(0.8); opacity: 0.5; }
50% { transform: scale(1.1); opacity: 1; }
}

.core.listening {
background: radial-gradient(circle at 35% 35%,
rgba(255, 100, 100, 0.9) 0%,
rgba(200, 50, 50, 0.7) 30%,
rgba(80, 10, 10, 0.9) 70%,
rgba(20, 5, 5, 1) 100%
);
box-shadow:
0 0 20px rgba(255, 80, 80, 0.8),
0 0 40px rgba(255, 80, 80, 0.4),
0 0 80px rgba(255, 80, 80, 0.2),
inset 0 0 20px rgba(255, 150, 150, 0.3);
animation: listeningPulse 0.8s ease-in-out infinite;
}

.core.thinking {
background: radial-gradient(circle at 35% 35%,
rgba(201, 168, 76, 0.9) 0%,
rgba(150, 110, 40, 0.7) 30%,
rgba(60, 40, 10, 0.9) 70%,
rgba(15, 10, 5, 1) 100%
);
box-shadow:
0 0 20px rgba(201, 168, 76, 0.8),
0 0 40px rgba(201, 168, 76, 0.4),
0 0 80px rgba(201, 168, 76, 0.2),
inset 0 0 20px rgba(240, 192, 96, 0.3);
}

@keyframes listeningPulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.05); }
}

/* Status */
.status {
font-family: ‘Rajdhani’, sans-serif;
font-size: 0.75rem;
letter-spacing: 0.3em;
color: var(–text-dim);
text-transform: uppercase;
min-height: 20px;
transition: color 0.3s;
}

.status.active { color: var(–blue); }
.status.listening { color: var(–red); }
.status.thinking { color: var(–gold); }
.status.speaking { color: var(–blue); }

/* Conversation panel */
.conversation {
width: 100%;
background: var(–panel);
border: 1px solid rgba(26, 140, 255, 0.15);
border-radius: 4px;
padding: 16px;
max-height: 280px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 12px;
scrollbar-width: thin;
scrollbar-color: var(–blue-dim) transparent;
}

.conversation:empty::after {
content: ‘Awaiting your command, sir.’;
color: var(–text-dim);
font-size: 0.8rem;
font-style: italic;
text-align: center;
padding: 20px 0;
}

.msg {
display: flex;
flex-direction: column;
gap: 3px;
}

.msg-label {
font-family: ‘Rajdhani’, sans-serif;
font-size: 0.6rem;
letter-spacing: 0.3em;
text-transform: uppercase;
}

.msg-user .msg-label { color: var(–gold-dim); }
.msg-jarvis .msg-label { color: var(–blue-dim); }

.msg-text {
font-size: 0.85rem;
font-weight: 300;
line-height: 1.5;
color: var(–text);
}

.msg-user .msg-text { color: rgba(201, 168, 76, 0.9); }

/* Corner decorations */
.panel-corner {
position: absolute;
width: 10px; height: 10px;
border-color: var(–gold-dim);
border-style: solid;
}

/* Controls */
.controls {
display: flex;
gap: 12px;
align-items: center;
}

.btn {
font-family: ‘Rajdhani’, sans-serif;
font-size: 0.7rem;
letter-spacing: 0.2em;
text-transform: uppercase;
padding: 8px 18px;
border-radius: 2px;
cursor: pointer;
transition: all 0.2s;
border: 1px solid;
}

.btn-primary {
background: rgba(26, 140, 255, 0.1);
border-color: rgba(26, 140, 255, 0.4);
color: var(–blue);
}

.btn-primary:hover {
background: rgba(26, 140, 255, 0.2);
box-shadow: 0 0 15px rgba(26, 140, 255, 0.3);
}

.btn-danger {
background: rgba(192, 57, 43, 0.1);
border-color: rgba(192, 57, 43, 0.4);
color: #e74c3c;
}

.btn-danger:hover {
background: rgba(192, 57, 43, 0.2);
}

/* Tap hint */
.tap-hint {
font-size: 0.65rem;
color: var(–text-dim);
letter-spacing: 0.15em;
text-align: center;
}

/* Scan line effect */
.scanline {
position: fixed;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, rgba(26, 140, 255, 0.4), transparent);
animation: scan 6s linear infinite;
z-index: 0;
pointer-events: none;
}

@keyframes scan {
0% { top: 0; opacity: 1; }
95% { opacity: 0.5; }
100% { top: 100vh; opacity: 0; }
}

/* HUD corners */
.hud-corner {
position: fixed;
width: 60px; height: 60px;
border-color: rgba(201, 168, 76, 0.2);
border-style: solid;
z-index: 1;
}

.hud-tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
.hud-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
.hud-bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }
.hud-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

/* System info */
.sys-info {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%);
font-family: ‘Rajdhani’, sans-serif;
font-size: 0.55rem;
letter-spacing: 0.3em;
color: rgba(90, 120, 160, 0.4);
text-transform: uppercase;
z-index: 1;
}

/* Audio visualizer bars */
.visualizer {
display: flex;
gap: 3px;
align-items: center;
height: 30px;
opacity: 0;
transition: opacity 0.3s;
}

.visualizer.active { opacity: 1; }

.bar {
width: 3px;
background: var(–blue);
border-radius: 2px;
animation: barAnim 0.8s ease-in-out infinite;
box-shadow: 0 0 4px var(–blue);
}

.bar:nth-child(1) { animation-delay: 0s; height: 8px; }
.bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
.bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
.bar:nth-child(4) { animation-delay: 0.15s; height: 20px; }
.bar:nth-child(5) { animation-delay: 0.05s; height: 12px; }
.bar:nth-child(6) { animation-delay: 0.25s; height: 18px; }
.bar:nth-child(7) { animation-delay: 0.1s; height: 10px; }

@keyframes barAnim {
0%, 100% { transform: scaleY(0.3); }
50% { transform: scaleY(1); }
}
</style>

</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="scanline"></div>
<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>

<!-- Setup Screen -->

<div id="setupScreen" style="display:flex; position:fixed; inset:0; z-index:100; align-items:center; justify-content:center; background:rgba(5,8,16,0.97);">
  <div style="width:320px; padding:32px; border:1px solid rgba(201,168,76,0.3); background:rgba(10,20,40,0.9); display:flex; flex-direction:column; gap:16px;">
    <div style="font-family:'Rajdhani',sans-serif; font-size:1.4rem; font-weight:700; color:#f0c060; letter-spacing:0.3em; text-align:center;">JARVIS SETUP</div>
    <div style="font-size:0.7rem; color:#5a7a9a; letter-spacing:0.15em; text-align:center;">Keys stored on this device only. Never uploaded anywhere.</div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-family:'Rajdhani',sans-serif; font-size:0.65rem; letter-spacing:0.2em; color:#7a6030; text-transform:uppercase;">ElevenLabs API Key</label>
      <input id="elInput" type="password" placeholder="Enter ElevenLabs key" style="background:rgba(26,140,255,0.05); border:1px solid rgba(26,140,255,0.2); color:#d0e8ff; padding:10px; font-family:'Exo 2',sans-serif; font-size:0.8rem; border-radius:2px; outline:none;">
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-family:'Rajdhani',sans-serif; font-size:0.65rem; letter-spacing:0.2em; color:#7a6030; text-transform:uppercase;">Groq API Key</label>
      <input id="groqInput" type="password" placeholder="Enter Groq key" style="background:rgba(26,140,255,0.05); border:1px solid rgba(26,140,255,0.2); color:#d0e8ff; padding:10px; font-family:'Exo 2',sans-serif; font-size:0.8rem; border-radius:2px; outline:none;">
    </div>
    <button onclick="saveKeys()" style="background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.4); color:#f0c060; font-family:'Rajdhani',sans-serif; font-size:0.8rem; letter-spacing:0.2em; text-transform:uppercase; padding:12px; cursor:pointer; border-radius:2px;">Activate Jarvis</button>
  </div>
</div>

<!-- Main App -->

<div id="mainScreen" style="display:none; flex-direction:column; align-items:center; width:100%;">
<div class="container">

  <div class="header">
    <div class="header-title">JARVIS</div>
    <div class="header-sub">Just A Rather Very Intelligent System</div>
  </div>

  <div class="reactor-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="core" id="coreBtn" onclick="toggleListening()"></div>
  </div>

  <div class="visualizer" id="visualizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div class="status" id="status">System Online</div>

  <div class="conversation" id="conversation"></div>

  <div class="controls">
    <button class="btn btn-danger" onclick="clearConversation()">Clear</button>
  </div>

  <div class="tap-hint">Tap the reactor to speak</div>

</div>

<div class="sys-info">JARVIS v2.0 &nbsp;|&nbsp; Stark Industries &nbsp;|&nbsp; All Systems Nominal</div>
</div></div>

<script>
  // ============================================================
  // CONFIGURATION -- Keys stored locally on device only
  // ============================================================
  const ELEVENLABS_VOICE_ID = "kfu9R4MJu3TPs74jkF7i";
  const GROQ_MODEL = "llama-3.3-70b-versatile";

  let ELEVENLABS_API_KEY = localStorage.getItem('jarvis_el_key') || '';
  let GROQ_API_KEY = localStorage.getItem('jarvis_groq_key') || '';

  // ============================================================
  // Key Setup
  // ============================================================
  function checkKeys() {
    if (!ELEVENLABS_API_KEY || !GROQ_API_KEY) {
      document.getElementById('setupScreen').style.display = 'flex';
      document.getElementById('mainScreen').style.display = 'none';
    } else {
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
    }
  }

  function saveKeys() {
    const el = document.getElementById('elInput').value.trim();
    const groq = document.getElementById('groqInput').value.trim();
    if (!el || !groq) { alert('Please enter both keys.'); return; }
    localStorage.setItem('jarvis_el_key', el);
    localStorage.setItem('jarvis_groq_key', groq);
    ELEVENLABS_API_KEY = el;
    GROQ_API_KEY = groq;
    checkKeys();
  }

  function resetKeys() {
    localStorage.removeItem('jarvis_el_key');
    localStorage.removeItem('jarvis_groq_key');
    ELEVENLABS_API_KEY = '';
    GROQ_API_KEY = '';
    checkKeys();
  }

  // ============================================================
  // State
  // ============================================================
  let isListening = false;
  let conversationHistory = [];
  let currentAudio = null;

  const SYSTEM_PROMPT = `You are JARVIS (Just A Rather Very Intelligent System), the highly intelligent AI assistant created by Tony Stark. You assist the user with intelligence, precision, and subtle dry wit.

Key traits:
- Always address the user as "sir"
- Speak in a calm, measured, British-inflected manner
- Be concise but thorough -- never ramble
- Subtle dry humor when appropriate, never forced
- Confident and never uncertain -- if you don't know something, say so directly
- Prioritize practical, actionable information
- Occasionally reference your capabilities or systems in a natural way
- Keep responses conversational -- this is a voice interface, so no bullet points or markdown

You have access to broad knowledge and can help with brainstorming, analysis, information, planning, and conversation.`;

  // ============================================================
  // Speech Recognition -- MediaRecorder + Groq Whisper (iPhone compatible)
  // ============================================================
  let mediaRecorder = null;
  let audioChunks = [];
  let mediaStream = null;

  function toggleListening() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    if (isListening) {
      stopListening();
    } else {
      startListening();
    }
  }

  async function startListening() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];

      // Pick best supported format for iPhone
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm')
        ? 'audio/webm'
        : 'audio/mp4';

      mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: mimeType });
        mediaStream.getTracks().forEach(t => t.stop());
        await transcribeWithWhisper(audioBlob, mimeType);
      };

      mediaRecorder.start();
      isListening = true;
      document.getElementById('coreBtn').className = 'core listening';
      document.getElementById('visualizer').className = 'visualizer active';
      setStatus('Listening... Tap to stop', 'listening');

    } catch (err) {
      console.error('Mic error:', err);
      setStatus('Mic access denied', '');
    }
  }

  function stopListening() {
    isListening = false;
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    document.getElementById('coreBtn').className = 'core thinking';
    document.getElementById('visualizer').className = 'visualizer';
    setStatus('Transcribing...', 'thinking');
  }

  async function transcribeWithWhisper(audioBlob, mimeType) {
    try {
      const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
      const formData = new FormData();
      formData.append('file', audioBlob, `audio.${ext}`);
      formData.append('model', 'whisper-large-v3-turbo');
      formData.append('language', 'en');

      const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${GROQ_API_KEY}` },
        body: formData
      });

      const data = await response.json();
      const transcript = data.text?.trim();

      if (!transcript) {
        setStatus('System Online', '');
        document.getElementById('coreBtn').className = 'core';
        return;
      }

      addMessage('user', transcript);
      await sendToGroq(transcript);

    } catch (err) {
      console.error('Whisper error:', err);
      setStatus('System Online', '');
      document.getElementById('coreBtn').className = 'core';
    }
  }

  // ============================================================
  // Groq API
  // ============================================================
  async function sendToGroq(userText) {
    setStatus('Processing...', 'thinking');
    document.getElementById('coreBtn').className = 'core thinking';

    conversationHistory.push({ role: 'user', content: userText });

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model: GROQ_MODEL,
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...conversationHistory
          ],
          max_tokens: 300,
          temperature: 0.7
        })
      });

      const data = await response.json();
      const reply = data.choices[0].message.content;
      conversationHistory.push({ role: 'assistant', content: reply });

      addMessage('jarvis', reply);
      await speakWithElevenLabs(reply);

    } catch (err) {
      console.error('Groq error:', err);
      setStatus('System Error', '');
      document.getElementById('coreBtn').className = 'core';
      addMessage('jarvis', 'My apologies, sir. I encountered a systems error. Please try again.');
    }
  }

  // ============================================================
  // ElevenLabs TTS
  // ============================================================
  async function speakWithElevenLabs(text) {
    setStatus('Speaking...', 'speaking');
    document.getElementById('coreBtn').className = 'core';
    document.getElementById('visualizer').className = 'visualizer active';

    try {
      const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'xi-api-key': ELEVENLABS_API_KEY
        },
        body: JSON.stringify({
          text: text,
          model_id: 'eleven_turbo_v2_5',
          voice_settings: {
            stability: 0.55,
            similarity_boost: 0.85,
            style: 0.2,
            use_speaker_boost: true
          }
        })
      });

      const audioBlob = await response.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      currentAudio = new Audio(audioUrl);

      currentAudio.onended = () => {
        document.getElementById('visualizer').className = 'visualizer';
        setStatus('System Online', '');
        currentAudio = null;
      };

      await currentAudio.play();

    } catch (err) {
      console.error('ElevenLabs error:', err);
      document.getElementById('visualizer').className = 'visualizer';
      setStatus('System Online', '');
    }
  }

  // ============================================================
  // UI Helpers
  // ============================================================
  function setStatus(text, cls) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status' + (cls ? ' ' + cls : '');
  }

  function addMessage(role, text) {
    const conv = document.getElementById('conversation');
    const msg = document.createElement('div');
    msg.className = `msg msg-${role}`;
    msg.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'You' : 'Jarvis'}</div>
      <div class="msg-text">${text}</div>
    `;
    conv.appendChild(msg);
    conv.scrollTop = conv.scrollHeight;
  }

  function clearConversation() {
    document.getElementById('conversation').innerHTML = '';
    conversationHistory = [];
    setStatus('System Online', '');
  }

  // Init
  checkKeys();
</script>

</body>
</html>
